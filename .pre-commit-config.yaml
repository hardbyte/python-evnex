fail_fast: true
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.8.12
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      - id: ruff-check
        args: [ --fix ]
        types_or: [ python, pyi ]
      - id: ruff-format
        types_or: [ python, pyi ]
  - repo: https://github.com/JelleZijlstra/autotyping
    rev: master
    hooks:
      - id: autotyping
        stages: [ pre-commit ]
        types: [ python ]
        args: [ --safe ]
        files: ^((custom_components)/.+)?[^/]+\.(py|pyi)$
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.16.0'
    hooks:
      - id: mypy
        files: ^evnex/
        additional_dependencies:
          - pydantic>=2.0.0
